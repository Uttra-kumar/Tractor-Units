<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Filter Fleet - Date Wise Report</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px;
            color: white;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .back-btn, .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            padding: 8px 15px;
            border-radius: 25px;
            color: white;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.15);
            padding: 10px 12px;
            border-radius: 15px;
        }

        .user-welcome {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .datetime-center {
            text-align: center;
        }

        .date, .time {
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .main-content {
            padding: 20px;
        }

        /* Filter Section */
        .filter-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 25px;
            border: 1px solid #e0e0e0;
        }

        .filter-title {
            margin-bottom: 15px;
            color: #333;
            font-size: 16px;
        }

        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
        }

        .filter-group {
            flex: 1;
            min-width: 150px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            font-weight: 500;
            color: #666;
        }

        .filter-group input, .filter-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
        }

        .filter-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
        }

        .reset-btn {
            background: #6c757d;
        }

        /* Date Group Section */
        .date-group {
            margin-bottom: 30px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            overflow: hidden;
        }

        .group-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .group-header h3 {
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .group-stats {
            display: flex;
            gap: 20px;
            font-size: 13px;
        }

        .group-stats span {
            background: rgba(255,255,255,0.2);
            padding: 4px 10px;
            border-radius: 20px;
        }

        .group-content {
            padding: 0;
            display: block;
        }

        .group-content.collapsed {
            display: none;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            background: #f8f9fa;
            padding: 10px;
            text-align: left;
            font-weight: 600;
            border-bottom: 1px solid #e0e0e0;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #f0f0f0;
            color: #666;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-approved {
            background: #d4edda;
            color: #155724;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .total-summary {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            margin-top: 20px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .filter-row {
                flex-direction: column;
            }
            .filter-group {
                width: 100%;
            }
            .group-header {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
            .group-stats {
                flex-wrap: wrap;
                justify-content: center;
            }
            th, td {
                font-size: 11px;
                padding: 6px;
            }
            .info-bar {
                flex-direction: column;
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="top-bar">
                <a href="fleetDashboard.html" class="back-btn">
                    <i class="fas fa-arrow-left"></i> Back
                </a>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
            
            <div class="info-bar">
                <div class="user-welcome">
                    <i class="fas fa-filter"></i>
                    <div>
                        <h4>Filter Fleet Report</h4>
                        <h3 id="userName">Loading...</h3>
                    </div>
                </div>
                
                <div class="datetime-center">
                    <div class="date">
                        <i class="fas fa-calendar-alt"></i>
                        <span id="currentDate">Loading...</span>
                    </div>
                    <div class="time">
                        <i class="fas fa-clock"></i>
                        <span id="currentTime">Loading...</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="main-content">
            <!-- Filter Section -->
            <div class="filter-section">
                <div class="filter-title">
                    <i class="fas fa-sliders-h"></i> Filter Options
                </div>
                <div class="filter-row">
                    <div class="filter-group">
                        <label><i class="fas fa-calendar-alt"></i> From Date</label>
                        <input type="date" id="fromDate">
                    </div>
                    <div class="filter-group">
                        <label><i class="fas fa-calendar-alt"></i> To Date</label>
                        <input type="date" id="toDate">
                    </div>
                    <div class="filter-group">
                        <label><i class="fas fa-user"></i> Farmer Name</label>
                        <select id="farmerSelect">
                            <option value="all">All Farmers</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label><i class="fas fa-chart-line"></i> Status</label>
                        <select id="statusSelect">
                            <option value="all">All</option>
                            <option value="approved">Approved</option>
                            <option value="pending">Pending</option>
                        </select>
                    </div>
                    <button class="filter-btn" onclick="applyFilter()">
                        <i class="fas fa-search"></i> Apply Filter
                    </button>
                    <button class="filter-btn reset-btn" onclick="resetFilter()">
                        <i class="fas fa-undo"></i> Reset
                    </button>
                </div>
            </div>
            
            <!-- Results Container -->
            <div id="resultsContainer">
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i> Loading data...
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://iydamvrlxtwsnqvflaxq.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5ZGFtdnJseHR3c25xdmZsYXhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgwOTczMTIsImV4cCI6MjA3MzY3MzMxMn0.Z8m6XGyu9wsN_UJ8EZYr12BRemsO12_U8EEZ9JizQ6w';
        const client = supabase.createClient(supabaseUrl, supabaseKey);

        const currentUser = sessionStorage.getItem('currentUser');
        if (!currentUser) {
            window.location.href = '../index.html';
        } else {
            const user = JSON.parse(currentUser);
            document.getElementById('userName').textContent = user.username || user.id || 'Admin';
        }

        // Date time
        function updateDateTime() {
            const now = new Date();
            document.getElementById('currentDate').textContent = now.toLocaleDateString('en-US', { 
                weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' 
            });
            document.getElementById('currentTime').textContent = now.toLocaleTimeString('en-US', { 
                hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true 
            });
        }
        updateDateTime();
        setInterval(updateDateTime, 1000);

        // Load farmers for dropdown
        async function loadFarmers() {
            const { data } = await client
                .from('farmers')
                .select('id, name')
                .order('name');
            
            const select = document.getElementById('farmerSelect');
            if (data) {
                data.forEach(farmer => {
                    select.innerHTML += `<option value="${farmer.id}">${farmer.name}</option>`;
                });
            }
        }

        // Format date
        function formatDate(dateString) {
            const date = new Date(dateString);
            return `${String(date.getDate()).padStart(2, '0')}/${String(date.getMonth() + 1).padStart(2, '0')}/${date.getFullYear()}`;
        }

        function getDateKey(dateString) {
            const date = new Date(dateString);
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }

        function isToday(dateString) {
            const today = new Date();
            const date = new Date(dateString);
            return date.toDateString() === today.toDateString();
        }

        function isYesterday(dateString) {
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            const date = new Date(dateString);
            return date.toDateString() === yesterday.toDateString();
        }

        function getDisplayDate(dateString) {
            if (isToday(dateString)) return "Today";
            if (isYesterday(dateString)) return "Yesterday";
            return formatDate(dateString);
        }

        // Apply filter
        async function applyFilter() {
            const fromDate = document.getElementById('fromDate').value;
            const toDate = document.getElementById('toDate').value;
            const farmerId = document.getElementById('farmerSelect').value;
            const status = document.getElementById('statusSelect').value;

            let query = client
                .from('fleetentry')
                .select(`
                    *,
                    farmers:farmer_id (name)
                `)
                .order('created_at', { ascending: false });

            // Apply date filter
            if (fromDate) {
                query = query.gte('created_at', `${fromDate}T00:00:00`);
            }
            if (toDate) {
                query = query.lte('created_at', `${toDate}T23:59:59`);
            }

            // Apply farmer filter
            if (farmerId !== 'all') {
                query = query.eq('farmer_id', parseInt(farmerId));
            }

            // Apply status filter
            if (status !== 'all') {
                query = query.eq('status', status);
            }

            const { data, error } = await query;

            if (error) {
                console.error('Error:', error);
                document.getElementById('resultsContainer').innerHTML = '<div class="no-data">Error loading data</div>';
                return;
            }

            displayGroupedData(data || []);
        }

        // Display data grouped by date
        function displayGroupedData(data) {
            const container = document.getElementById('resultsContainer');
            
            if (!data || data.length === 0) {
                container.innerHTML = '<div class="no-data"><i class="fas fa-search"></i> No records found</div>';
                return;
            }

            // Group by date
            const grouped = {};
            data.forEach(record => {
                const dateKey = getDateKey(record.created_at);
                if (!grouped[dateKey]) {
                    grouped[dateKey] = [];
                }
                grouped[dateKey].push(record);
            });

            // Sort dates descending
            const sortedDates = Object.keys(grouped).sort((a, b) => new Date(b) - new Date(a));

            let html = '';
            let grandTotalTime = 0;
            let grandTotalTrips = 0;

            for (const dateKey of sortedDates) {
                const records = grouped[dateKey];
                const totalTime = records.reduce((sum, r) => sum + r.time, 0);
                const totalTrips = records.length;
                
                grandTotalTime += totalTime;
                grandTotalTrips += totalTrips;

                html += `
                    <div class="date-group">
                        <div class="group-header" onclick="toggleGroup(this)">
                            <h3>
                                <i class="fas fa-calendar-day"></i>
                                ${getDisplayDate(dateKey)}
                                <span style="font-size: 12px; opacity: 0.8;">(${dateKey})</span>
                            </h3>
                            <div class="group-stats">
                                <span><i class="fas fa-chart-line"></i> Trips: ${totalTrips}</span>
                                <span><i class="fas fa-clock"></i> Time: ${totalTime} min</span>
                            </div>
                            <i class="fas fa-chevron-down" style="transition: transform 0.3s;"></i>
                        </div>
                        <div class="group-content">
                            <div class="table-container">
                                <table>
                                    <thead>
                                        <tr>
                                            <th>#</th>
                                            <th>Farmer Name</th>
                                            <th>Fleet ID</th>
                                            <th>Time (min)</th>
                                            <th>Status</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                `;

                records.forEach((record, idx) => {
                    html += `
                        <tr>
                            <td>${idx + 1}</td>
                            <td><strong>${escapeHtml(record.farmers?.name || record.name || 'Unknown')}</strong></td>
                            <td>${record.fleet_id}</td>
                            <td>${record.time} min</td>
                            <td><span class="status-badge status-${record.status || 'pending'}">${record.status || 'pending'}</span></td>
                        </tr>
                    `;
                });

                html += `
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                `;
            }

            // Add grand total
            html += `
                <div class="total-summary">
                    <i class="fas fa-chart-bar"></i>
                    <strong>Grand Total:</strong> 
                    ${grandTotalTrips} Trips | 
                    ${grandTotalTime} Minutes Total Time
                </div>
            `;

            container.innerHTML = html;
        }

        // Toggle group collapse/expand
        function toggleGroup(element) {
            const content = element.nextElementSibling;
            const icon = element.querySelector('.fa-chevron-down');
            
            if (content.classList.contains('collapsed')) {
                content.classList.remove('collapsed');
                icon.style.transform = 'rotate(0deg)';
            } else {
                content.classList.add('collapsed');
                icon.style.transform = 'rotate(-90deg)';
            }
        }

        // Reset filter
        function resetFilter() {
            document.getElementById('fromDate').value = '';
            document.getElementById('toDate').value = '';
            document.getElementById('farmerSelect').value = 'all';
            document.getElementById('statusSelect').value = 'all';
            applyFilter();
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function logout() {
            sessionStorage.removeItem('currentUser');
            window.location.href = '../index.html';
        }

        // Initialize
        loadFarmers();
        applyFilter();
    </script>
</body>
</html>
