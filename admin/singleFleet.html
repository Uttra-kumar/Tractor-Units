<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Farmer Fleet Details</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px;
            color: white;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .back-btn, .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            padding: 8px 15px;
            border-radius: 25px;
            color: white;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }

        .farmer-info {
            background: rgba(255, 255, 255, 0.15);
            padding: 12px;
            border-radius: 15px;
            margin-top: 10px;
        }

        .farmer-info h2 {
            font-size: 18px;
            margin-bottom: 5px;
        }

        .farmer-info p {
            font-size: 12px;
            opacity: 0.9;
        }

        .main-content {
            padding: 20px;
        }

        /* Stats Card - Single Row */
.stats-card {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 15px 20px;
    border-radius: 16px;
    margin-bottom: 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: white;
}

.stat-item {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
    justify-content: center;
}

.stat-item i {
    font-size: 28px;
}

.stat-item h4 {
    font-size: 12px;
    opacity: 0.9;
    margin-bottom: 2px;
}

.stat-item p {
    font-size: 22px;
    font-weight: 700;
    margin: 0;
}

.stat-info {
    text-align: left;
}
        .stat-item h4 {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .stat-item p {
            font-size: 24px;
            font-weight: 700;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .section-title i {
            font-size: 20px;
            color: #667eea;
        }

        .table-container {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            background: #f8f9fa;
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #f0f0f0;
            color: #666;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-approved {
            background: #d4edda;
            color: #155724;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .loading, .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        @media (max-width: 500px) {
            .stats-card {
                flex-direction: column;
                gap: 15px;
            }
            
            .stat-item p {
                font-size: 20px;
            }
            
            th, td {
                font-size: 11px;
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="top-bar">
                <a href="fleetFarmerCards.html" class="back-btn">
                    <i class="fas fa-arrow-left"></i> Back
                </a>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
            <div class="farmer-info" id="farmerInfo">
                <h2><i class="fas fa-truck"></i> Loading farmer details...</h2>
            </div>
        </div>
        
        <div class="main-content">
            <!-- Stats Card - Only Total Trips and Total Time -->
            <div class="stats-card">
                <div class="stat-item">
                    <i class="fas fa-chart-line"></i>
                    <h4>Total Rows</h4>
                    <p id="totalTrips">0</p>
                </div>
                <div class="stat-item">
                    <i class="fas fa-clock"></i>
                    <h4>Total Time</h4>
                    <p id="totalTime">0 min</p>
                </div>
            </div>
            
            <div class="section-title">
                <i class="fas fa-list"></i>
                <h3>Fleet Records</h3>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Fleet ID</th>
                            <th>Time (min)</th>
                            <th>Date (DD/MM/YYYY)</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="5" class="loading"><i class="fas fa-spinner fa-spin"></i> Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://iydamvrlxtwsnqvflaxq.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5ZGFtdnJseHR3c25xdmZsYXhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgwOTczMTIsImV4cCI6MjA3MzY3MzMxMn0.Z8m6XGyu9wsN_UJ8EZYr12BRemsO12_U8EEZ9JizQ6w';
        const client = supabase.createClient(supabaseUrl, supabaseKey);

        // Get farmerId from URL
        const urlParams = new URLSearchParams(window.location.search);
        const farmerId = urlParams.get('farmerId');

        // Format date as DD/MM/YYYY
        function formatDate(dateString) {
            const date = new Date(dateString);
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const year = date.getFullYear();
            return `${day}/${month}/${year}`;
        }

        async function loadData() {
            if (!farmerId) {
                document.getElementById('farmerInfo').innerHTML = '<h2>No farmer selected</h2>';
                return;
            }

            try {
                // Load farmer details
                const { data: farmer } = await client
                    .from('farmers')
                    .select('*')
                    .eq('id', farmerId)
                    .single();

                if (farmer) {
                    document.getElementById('farmerInfo').innerHTML = `
                        <h2><i class="fas fa-user"></i> ${farmer.name}</h2>
                        <p><i class="fas fa-id-card"></i> ${farmer.farmerid} | <i class="fas fa-map-marker-alt"></i> ${farmer.address || 'No address'}</p>
                    `;
                }

                // Load fleet records
                const { data: records } = await client
                    .from('fleetentry')
                    .select('*')
                    .eq('farmer_id', farmerId)
                    .order('created_at', { ascending: false });

                if (records && records.length > 0) {
                    let totalTime = 0;
                    records.forEach(r => {
                        totalTime += r.time;
                    });
                    
                    // Update stats card
                    document.getElementById('totalTrips').textContent = records.length;
                    document.getElementById('totalTime').textContent = totalTime + ' min';
                    
                    // Display table
                    const tbody = document.getElementById('tableBody');
                    tbody.innerHTML = records.map((record, idx) => `
                        <tr>
                            <td>${idx + 1}</td>
                            <td>${record.fleet_id}</td>
                            <td>${record.time} min</td>
                            <td>${formatDate(record.created_at)}</td>
                            <td><span class="status-badge status-${record.status || 'pending'}">${record.status || 'pending'}</span></td>
                        </tr>
                    `).join('');
                } else {
                    document.getElementById('tableBody').innerHTML = '<tr><td colspan="5" class="no-data">No fleet records found</td></tr>';
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="5" class="no-data">Error loading data</td></tr>';
            }
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                sessionStorage.removeItem('currentUser');
                alert('Logged out successfully!');
                window.location.href = '../index.html';
            }
        }

        loadData();
    </script>
</body>
</html>
