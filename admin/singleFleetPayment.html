<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Farmer Payment Management</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px;
            color: white;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .back-btn, .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            padding: 8px 15px;
            border-radius: 25px;
            color: white;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }

        .farmer-info {
            background: rgba(255, 255, 255, 0.15);
            padding: 12px;
            border-radius: 15px;
            margin-top: 10px;
        }

        .main-content {
            padding: 20px;
        }

        .info-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
        }

        .payment-form-card {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid #e0e0e0;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 13px;
        }

        .form-group input {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
        }

        .form-group input[readonly] {
            background: #e9ecef;
        }

        .save-payment-btn {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            font-size: 16px;
        }

        .warning-box {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .table-container {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }

        th {
            background: #f8f9fa;
            font-weight: 600;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-paid {
            background: #d4edda;
            color: #155724;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .action-buttons {
            display: flex;
            gap: 5px;
        }

        .edit-btn, .delete-btn, .approve-payment-btn {
            padding: 4px 8px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
        }

        .edit-btn {
            background: #4a90e2;
            color: white;
        }

        .delete-btn {
            background: #e74c3c;
            color: white;
        }

        .approve-payment-btn {
            background: #2ecc71;
            color: white;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="top-bar">
                <a href="fleetFarmerCards.html" class="back-btn">
                    <i class="fas fa-arrow-left"></i> Back
                </a>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
            <div class="farmer-info" id="farmerInfo">
                <h2><i class="fas fa-rupee-sign"></i> Loading...</h2>
            </div>
        </div>
        
        <div class="main-content">
            <!-- Info Box -->
            <div class="info-box" id="infoBox">
                <i class="fas fa-info-circle"></i> Loading payment details...
            </div>
            
            <!-- Payment Form -->
            <div class="payment-form-card">
                <h3 style="margin-bottom: 15px;"><i class="fas fa-calculator"></i> New Payment</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Pending Time (Minutes)</label>
                        <input type="number" id="pendingTime" readonly>
                    </div>
                    <div class="form-group">
                        <label>Rate per Minute (₹)</label>
                        <input type="number" id="ratePerMinute" value="10" step="0.5" oninput="calculateTotal()">
                    </div>
                    <div class="form-group">
                        <label>Total Amount (₹)</label>
                        <input type="number" id="totalAmount" readonly>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Paid Amount (₹)</label>
                        <input type="number" id="paidAmount" placeholder="Enter paid amount" oninput="calculateDue()">
                    </div>
                    <div class="form-group">
                        <label>Discount (₹)</label>
                        <input type="number" id="discount" value="0" oninput="calculateDue()">
                    </div>
                    <div class="form-group">
                        <label>Due Amount (₹)</label>
                        <input type="number" id="dueAmount" readonly>
                    </div>
                </div>
                <button class="save-payment-btn" onclick="savePayment()">
                    <i class="fas fa-save"></i> Create Payment Record
                </button>
            </div>
            
            <!-- Payment Records Table -->
            <div class="section-title" style="margin-top: 25px;">
                <i class="fas fa-history"></i>
                <h3>Payment History</h3>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Pay ID</th>
                            <th>Time (min)</th>
                            <th>Total Amount</th>
                            <th>Paid</th>
                            <th>Discount</th>
                            <th>Due</th>
                            <th>Date</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="paymentTableBody">
                        <tr><td colspan="10" style="text-align:center">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://iydamvrlxtwsnqvflaxq.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5ZGFtdnJseHR3c25xdmZsYXhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgwOTczMTIsImV4cCI6MjA3MzY3MzMxMn0.Z8m6XGyu9wsN_UJ8EZYr12BRemsO12_U8EEZ9JizQ6w';
        const client = supabase.createClient(supabaseUrl, supabaseKey);

        const urlParams = new URLSearchParams(window.location.search);
        const farmerId = urlParams.get('farmerId');
        let currentFarmer = null;
        let pendingMinutes = 0;

        function formatDate(dateString) {
            const date = new Date(dateString);
            return `${String(date.getDate()).padStart(2, '0')}/${String(date.getMonth() + 1).padStart(2, '0')}/${date.getFullYear()}`;
        }

        // Get pending trips (approved but not paid)
        async function getPendingTrips() {
            const { data, error } = await client
                .from('fleetentry')
                .select('*')
                .eq('farmer_id', farmerId)
                .eq('status', 'approved')
                .eq('payment_status', 'unpaid');
            
            if (error) return [];
            return data || [];
        }

        // Calculate pending time
        async function calculatePendingTime() {
            const pendingTrips = await getPendingTrips();
            pendingMinutes = pendingTrips.reduce((sum, t) => sum + t.time, 0);
            
            document.getElementById('pendingTime').value = pendingMinutes;
            document.getElementById('infoBox').innerHTML = `
                <i class="fas fa-clock"></i> Pending Trips: ${pendingTrips.length} | 
                Total Pending Time: ${pendingMinutes} minutes
                ${pendingMinutes === 0 ? '<br><i class="fas fa-check-circle"></i> No pending trips! All trips are paid.' : ''}
            `;
            
            calculateTotal();
            return pendingTrips;
        }

        function calculateTotal() {
            const rate = parseFloat(document.getElementById('ratePerMinute').value) || 0;
            const total = pendingMinutes * rate;
            document.getElementById('totalAmount').value = total.toFixed(2);
            calculateDue();
        }

        function calculateDue() {
            const total = parseFloat(document.getElementById('totalAmount').value) || 0;
            const paid = parseFloat(document.getElementById('paidAmount').value) || 0;
            const discount = parseFloat(document.getElementById('discount').value) || 0;
            const due = total - paid - discount;
            document.getElementById('dueAmount').value = due.toFixed(2);
        }

        async function generatePayId() {
            const { data } = await client
                .from('payments')
                .select('pay_id')
                .order('id', { ascending: false })
                .limit(1);
            
            if (data && data.length > 0) {
                const lastNum = parseInt(data[0].pay_id.replace('PAY', ''));
                return `PAY${String(lastNum + 1).padStart(5, '0')}`;
            }
            return 'PAY00001';
        }

        async function savePayment() {
            if (pendingMinutes === 0) {
                alert('No pending trips to pay!');
                return;
            }

            const totalAmount = parseFloat(document.getElementById('totalAmount').value) || 0;
            const paid = parseFloat(document.getElementById('paidAmount').value) || 0;
            const discount = parseFloat(document.getElementById('discount').value) || 0;
            const due = parseFloat(document.getElementById('dueAmount').value) || 0;

            if (paid === 0 && discount === 0 && due > 0) {
                if (!confirm('Paid amount is 0. Continue?')) return;
            }

            const payId = await generatePayId();

            // Save payment record
            const { error: paymentError } = await client
                .from('payments')
                .insert([{
                    pay_id: payId,
                    farmer_id: parseInt(farmerId),
                    name: currentFarmer.name,
                    total_time: pendingMinutes,
                    total_balance: totalAmount,
                    paid: paid,
                    discount: discount,
                    due: due,
                    status: due === 0 ? 'paid' : 'pending',
                    created_at: new Date().toISOString()
                }]);

            if (paymentError) {
                alert('Error: ' + paymentError.message);
                return;
            }

            // Mark all pending trips as paid
            const pendingTrips = await getPendingTrips();
            for (let trip of pendingTrips) {
                await client
                    .from('fleetentry')
                    .update({ payment_status: 'paid' })
                    .eq('id', trip.id);
            }

            alert('Payment record created and trips marked as paid!');
            
            // Reset form
            document.getElementById('paidAmount').value = '';
            document.getElementById('discount').value = '0';
            document.getElementById('dueAmount').value = '';
            
            // Reload data
            await calculatePendingTime();
            loadPayments();
        }

        async function loadPayments() {
            const { data, error } = await client
                .from('payments')
                .select('*')
                .eq('farmer_id', farmerId)
                .order('created_at', { ascending: false });
            
            if (error) return;
            
            const tbody = document.getElementById('paymentTableBody');
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" style="text-align:center">No payment records found</td></tr>';
                return;
            }
            
            tbody.innerHTML = data.map((p, idx) => `
                <tr>
                    <td>${idx + 1}</td>
                    <td><strong>${p.pay_id}</strong></td>
                    <td>${p.total_time} min</td>
                    <td>₹${p.total_balance}</td>
                    <td>₹${p.paid}</td>
                    <td>₹${p.discount}</td>
                    <td>₹${p.due}</td>
                    <td>${formatDate(p.created_at)}</td>
                    <td><span class="status-badge status-${p.status === 'paid' ? 'paid' : 'pending'}">${p.status}</span></td>
                    <td class="action-buttons">
                        ${p.status === 'pending' ? `<button class="approve-payment-btn" onclick="approvePayment(${p.id})"><i class="fas fa-check"></i></button>` : ''}
                        <button class="delete-btn" onclick="deletePayment(${p.id})"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        async function approvePayment(id) {
            if (confirm('Approve this payment? This will mark trips as paid.')) {
                const { data: payment } = await client
                    .from('payments')
                    .select('*')
                    .eq('id', id)
                    .single();
                
                if (payment && payment.due === 0) {
                    // Mark payment as paid
                    await client
                        .from('payments')
                        .update({ status: 'paid' })
                        .eq('id', id);
                    
                    alert('Payment approved!');
                    await calculatePendingTime();
                    loadPayments();
                } else {
                    alert('Payment still has due amount. Please collect full payment first.');
                }
            }
        }

        async function deletePayment(id) {
            if (confirm('Delete this payment record?')) {
                const { error } = await client
                    .from('payments')
                    .delete()
                    .eq('id', id);
                
                if (error) {
                    alert('Error: ' + error.message);
                } else {
                    alert('Payment deleted!');
                    await calculatePendingTime();
                    loadPayments();
                }
            }
        }

        async function loadFarmerData() {
            if (!farmerId) return;
            
            const { data: farmer } = await client
                .from('farmers')
                .select('*')
                .eq('id', farmerId)
                .single();
            
            if (farmer) {
                currentFarmer = farmer;
                document.getElementById('farmerInfo').innerHTML = `
                    <h2><i class="fas fa-user"></i> ${farmer.name}</h2>
                    <p><i class="fas fa-id-card"></i> ${farmer.farmerid} | <i class="fas fa-map-marker-alt"></i> ${farmer.address || 'No address'}</p>
                `;
                await calculatePendingTime();
            }
        }

        function logout() {
            sessionStorage.removeItem('currentUser');
            window.location.href = '../index.html';
        }

        loadFarmerData();
        loadPayments();
    </script>
</body>
</html>
