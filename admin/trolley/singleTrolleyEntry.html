<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Farmer Trolley Details</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --success: #4cc9f0;
            --danger: #f72585;
            --warning: #f8961e;
            --trolley: #f39c12;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, rgba(243, 156, 18, 0.2), rgba(230, 126, 34, 0.2));
            padding: 15px;
            color: white;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .back-btn, .logout-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            padding: 8px 15px;
            border-radius: 25px;
            color: white;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .back-btn:hover, .logout-btn:hover {
            background: rgba(243, 156, 18, 0.5);
            transform: scale(0.98);
        }

        .farmer-info {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
            margin-top: 10px;
        }

        .farmer-info h2 {
            font-size: 20px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .farmer-info p {
            font-size: 13px;
            opacity: 0.9;
        }

        .main-content {
            padding: 20px;
        }

        /* Stats Card */
        .stats-card {
            background: linear-gradient(135deg, rgba(243, 156, 18, 0.2), rgba(230, 126, 34, 0.2));
            padding: 15px 20px;
            border-radius: 16px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            border: 1px solid rgba(243, 156, 18, 0.3);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            justify-content: center;
        }

        .stat-item i {
            font-size: 32px;
            color: var(--trolley);
        }

        .stat-info {
            text-align: left;
        }

        .stat-info h4 {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 2px;
        }

        .stat-info p {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        .section-title i {
            font-size: 20px;
            color: var(--trolley);
        }

        .section-title h3 {
            font-size: 18px;
            color: white;
            font-weight: 600;
        }

        .table-container {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            background: rgba(0, 0, 0, 0.4);
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: var(--trolley);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.9);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-approved {
            background: rgba(76, 201, 240, 0.2);
            color: var(--success);
        }

        .status-pending {
            background: rgba(248, 150, 30, 0.2);
            color: var(--warning);
        }

        .loading, .no-data {
            text-align: center;
            padding: 40px;
            color: rgba(255, 255, 255, 0.7);
        }

        .loading i {
            font-size: 32px;
            color: var(--trolley);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .stats-card {
                flex-direction: column;
                gap: 15px;
            }
            
            .stat-item {
                width: 100%;
                justify-content: space-between;
            }
            
            .stat-info {
                text-align: left;
                flex: 1;
            }
            
            .stat-info p {
                font-size: 20px;
            }
            
            th, td {
                font-size: 11px;
                padding: 8px;
            }
            
            .farmer-info h2 {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="top-bar">
                <a href="trolleyFarmerCards.html" class="back-btn">
                    <i class="fas fa-arrow-left"></i> Back to List
                </a>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
            <div class="farmer-info" id="farmerInfo">
                <h2><i class="fas fa-shopping-cart"></i> Loading farmer details...</h2>
                <p><i class="fas fa-id-card"></i> Loading...</p>
            </div>
        </div>
        
        <div class="main-content">
            <!-- Stats Card -->
            <div class="stats-card">
                <div class="stat-item">
                    <i class="fas fa-chart-line"></i>
                    <div class="stat-info">
                        <h4>Total Records</h4>
                        <p id="totalRecords">0</p>
                    </div>
                </div>
                <div class="stat-item">
                    <i class="fas fa-shopping-cart"></i>
                    <div class="stat-info">
                        <h4>Total Trolleys</h4>
                        <p id="totalTrolleys">0</p>
                    </div>
                </div>
            </div>
            
            <div class="section-title">
                <i class="fas fa-list"></i>
                <h3>Trolley Records</h3>
            </div>
            <div class="table-container">
                 <table>
                    <thead>
                         <tr>
                            <th>#</th>
                            <th>Trolley ID</th>
                            <th>Trolley Count</th>
                            <th>Date (DD/MM/YYYY)</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="5" class="loading"><i class="fas fa-spinner"></i> Loading...<br>Please wait</td></tr>
                    </tbody>
                 </table>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://iydamvrlxtwsnqvflaxq.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5ZGFtdnJseHR3c25xdmZsYXhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgwOTczMTIsImV4cCI6MjA3MzY3MzMxMn0.Z8m6XGyu9wsN_UJ8EZYr12BRemsO12_U8EEZ9JizQ6w';
        const client = supabase.createClient(supabaseUrl, supabaseKey);
        
        // Check auth
        const currentUser = sessionStorage.getItem('currentUser');
        if (!currentUser) {
            window.location.href = '../../index.html';
        }
        
        // Get farmer ID from URL and clean it (remove quotes if any)
        const urlParams = new URLSearchParams(window.location.search);
        let farmerId = urlParams.get('farmerId');
        
        // Clean the farmerId - remove any quotes
        if (farmerId) {
            farmerId = farmerId.replace(/["']/g, '');
            farmerId = parseInt(farmerId);
        }
        
        // Format date as DD/MM/YYYY
        function formatDate(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const year = date.getFullYear();
            return `${day}/${month}/${year}`;
        }
        
        async function loadData() {
            if (!farmerId || isNaN(farmerId)) {
                document.getElementById('farmerInfo').innerHTML = '<h2><i class="fas fa-exclamation-triangle"></i> Invalid farmer ID</h2>';
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="5" class="no-data">Invalid farmer ID</td></tr>';
                return;
            }
            
            try {
                // Load farmer details from trolley_farmers table
                const { data: farmer, error: farmerError } = await client
                    .from('trolley_farmers')
                    .select('*')
                    .eq('id', farmerId)
                    .single();
                
                if (farmerError) {
                    console.error('Farmer error:', farmerError);
                    document.getElementById('farmerInfo').innerHTML = '<h2><i class="fas fa-exclamation-triangle"></i> Farmer not found</h2>';
                    document.getElementById('tableBody').innerHTML = '<tr><td colspan="5" class="no-data">Farmer not found</td></tr>';
                    return;
                }
                
                if (farmer) {
                    document.getElementById('farmerInfo').innerHTML = `
                        <h2><i class="fas fa-user-circle"></i> ${escapeHtml(farmer.name)}</h2>
                        <p><i class="fas fa-id-card"></i> ${escapeHtml(farmer.farmerid)} | <i class="fas fa-map-marker-alt"></i> ${escapeHtml(farmer.address) || 'Address not provided'}</p>
                    `;
                }
                
                // Load trolley records from trolley_entry table
                const { data: records, error: recordsError } = await client
                    .from('trolley_entry')
                    .select('*')
                    .eq('farmer_id', farmerId)
                    .order('created_at', { ascending: false });
                
                if (recordsError) {
                    console.error('Records error:', recordsError);
                    document.getElementById('tableBody').innerHTML = '<tr><td colspan="5" class="no-data">Error loading records</td></tr>';
                    return;
                }
                
                if (records && records.length > 0) {
                    let totalTrolleys = 0;
                    records.forEach(r => {
                        totalTrolleys += r.trolley_count;
                    });
                    
                    // Update stats card
                    document.getElementById('totalRecords').textContent = records.length;
                    document.getElementById('totalTrolleys').textContent = totalTrolleys;
                    
                    // Display table
                    const tbody = document.getElementById('tableBody');
                    tbody.innerHTML = records.map((record, idx) => {
                        const statusClass = record.status === 'approved' ? 'status-approved' : 'status-pending';
                        const statusText = record.status === 'approved' ? 'Approved' : 'Pending';
                        
                        return `
                            <tr>
                                <td><strong>${idx + 1}</strong></td>
                                <td>${record.trolley_id}</td>
                                <td>${record.trolley_count} trolleys</td>
                                <td>${formatDate(record.created_at)}</td>
                                <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                            </tr>
                        `;
                    }).join('');
                } else {
                    document.getElementById('tableBody').innerHTML = '<tr><td colspan="5" class="no-data"><i class="fas fa-inbox"></i> No trolley records found</td></tr>';
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="5" class="no-data"><i class="fas fa-exclamation-triangle"></i> Error loading data</td></tr>';
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                sessionStorage.removeItem('currentUser');
                alert('Logged out successfully!');
                window.location.href = '../../index.html';
            }
        }
        
        loadData();
    </script>
</body>
</html>
