<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Farmer Trolley Payment</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --success: #4cc9f0;
            --danger: #f72585;
            --warning: #f8961e;
            --trolley: #f39c12;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header {
            background: linear-gradient(135deg, rgba(243, 156, 18, 0.2), rgba(230, 126, 34, 0.2));
            padding: 15px;
            color: white;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .back-btn, .logout-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            padding: 8px 15px;
            border-radius: 25px;
            color: white;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }

        .farmer-info {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
            margin-top: 10px;
        }

        .farmer-info h2 {
            font-size: 20px;
            margin-bottom: 5px;
        }

        .main-content {
            padding: 20px;
        }

        /* Alert Box */
        .alert-box {
            background: rgba(248, 150, 30, 0.2);
            border-left: 4px solid var(--warning);
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alert-box i {
            color: var(--warning);
            font-size: 18px;
        }

        .alert-box p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 13px;
            flex: 1;
        }

        .alert-box button {
            background: var(--warning);
            border: none;
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            color: white;
        }

        /* Form Card */
        .form-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .form-title {
            margin-bottom: 20px;
            color: var(--trolley);
            font-size: 18px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
            font-size: 13px;
        }

        .form-group input, .form-group select {
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 14px;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--trolley);
        }

        .form-group input[readonly] {
            background: rgba(0, 0, 0, 0.5);
            cursor: not-allowed;
        }

        .save-btn {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3);
        }

        /* Table */
        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        .table-container {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        th {
            background: rgba(0, 0, 0, 0.4);
            font-weight: 600;
            color: var(--trolley);
        }

        td {
            color: rgba(255, 255, 255, 0.9);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .status-paid {
            background: rgba(76, 201, 240, 0.2);
            color: var(--success);
        }

        .status-partial {
            background: rgba(248, 150, 30, 0.2);
            color: var(--warning);
        }

        .status-pending {
            background: rgba(247, 37, 133, 0.2);
            color: var(--danger);
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            th, td {
                font-size: 11px;
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="top-bar">
                <a href="trolleyFarmerCards.html" class="back-btn">
                    <i class="fas fa-arrow-left"></i> Back
                </a>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
            <div class="farmer-info" id="farmerInfo">
                <h2><i class="fas fa-user"></i> Loading...</h2>
                <p><i class="fas fa-id-card"></i> Loading...</p>
            </div>
        </div>
        
        <div class="main-content">
            <!-- Alert for pending due -->
            <div class="alert-box" id="alertBox" style="display: none;">
                <i class="fas fa-exclamation-triangle"></i>
                <p id="alertMessage"></p>
                <button onclick="fillDue()">Use Due Amount</button>
            </div>
            
            <!-- Payment Form -->
            <div class="form-card">
                <h3 class="form-title"><i class="fas fa-calculator"></i> Trolley Payment</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Pending Records</label>
                        <input type="text" id="pendingRecords" readonly>
                    </div>
                    <div class="form-group">
                        <label>Total Trolleys</label>
                        <input type="text" id="totalTrolleys" readonly>
                    </div>
                    <div class="form-group">
                        <label>Rate per Trolley (₹)</label>
                        <input type="number" id="ratePerTrolley" value="5" step="0.5" oninput="calculateTotal()">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Total Amount (₹)</label>
                        <input type="text" id="totalAmount" readonly>
                    </div>
                    <div class="form-group">
                        <label>Paid Amount (₹)</label>
                        <input type="number" id="paidAmount" placeholder="Enter paid amount" oninput="calculateDue()">
                    </div>
                    <div class="form-group">
                        <label>Discount (₹)</label>
                        <input type="number" id="discount" value="0" oninput="calculateDue()">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Due Amount (₹)</label>
                        <input type="text" id="dueAmount" readonly>
                    </div>
                    <div class="form-group">
                        <label>Payment Mode</label>
                        <select id="paymentMode">
                            <option value="cash">Cash</option>
                            <option value="upi">UPI</option>
                        </select>
                    </div>
                </div>
                <button class="save-btn" onclick="savePayment()">
                    <i class="fas fa-save"></i> Save Payment
                </button>
            </div>
            
            <!-- Payment History -->
            <div class="section-title">
                <i class="fas fa-history"></i>
                <h3>Payment History</h3>
            </div>
            <div class="table-container">
                 <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Pay ID</th>
                            <th>Total Trolleys</th>
                            <th>Total Amount</th>
                            <th>Paid</th>
                            <th>Discount</th>
                            <th>Due</th>
                            <th>Mode</th>
                            <th>Status</th>
                            <th>Date</th>
                        </thead>
                    <tbody id="paymentHistory">
                        的人<td colspan="10" style="text-align:center">Loading...<i class="fas fa-spinner fa-spin"></i> </td>
                    </tbody>
                 </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://iydamvrlxtwsnqvflaxq.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5ZGFtdnJseHR3c25xdmZsYXhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgwOTczMTIsImV4cCI6MjA3MzY3MzMxMn0.Z8m6XGyu9wsN_UJ8EZYr12BRemsO12_U8EEZ9JizQ6w';
        const client = supabase.createClient(supabaseUrl, supabaseKey);
        
        // Get farmer ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        let farmerId = urlParams.get('farmerId');
        
        // Clean farmer ID
        if (farmerId) {
            farmerId = farmerId.replace(/["']/g, '');
            farmerId = parseInt(farmerId);
        }
        
        let farmerData = null;
        let pendingRecords = [];
        let pendingTrolleys = 0;
        let lastDue = 0;
        
        // Get pending trolley records (approved & unpaid)
        async function getPendingRecords() {
            const { data, error } = await client
                .from('trolley_entry')
                .select('*')
                .eq('farmer_id', farmerId)
                .eq('status', 'approved')
                .eq('payment_status', 'unpaid');
            
            if (error) {
                console.error('Error fetching pending records:', error);
                return [];
            }
            
            console.log('Pending records found:', data);
            return data || [];
        }
        
        // Get last due from payments
        async function getLastDue() {
            const { data } = await client
                .from('trolley_payments')
                .select('due')
                .eq('farmer_id', farmerId)
                .order('created_at', { ascending: false })
                .limit(1);
            
            if (data && data.length > 0 && data[0].due > 0) {
                lastDue = data[0].due;
                document.getElementById('alertBox').style.display = 'flex';
                document.getElementById('alertMessage').innerHTML = `Last payment has due of ₹${lastDue}. Click "Use Due Amount" to add to total balance.`;
            } else {
                document.getElementById('alertBox').style.display = 'none';
                lastDue = 0;
            }
            return lastDue;
        }
        
        // Calculate total
        function calculateTotal() {
            const trolleys = pendingTrolleys;
            const rate = parseFloat(document.getElementById('ratePerTrolley').value) || 0;
            const calculated = trolleys * rate;
            document.getElementById('totalAmount').value = '₹' + calculated.toFixed(2);
            calculateDue();
        }
        
        // Calculate due
        function calculateDue() {
            const trolleys = pendingTrolleys;
            const rate = parseFloat(document.getElementById('ratePerTrolley').value) || 0;
            const total = (trolleys * rate) + lastDue;
            const paid = parseFloat(document.getElementById('paidAmount').value) || 0;
            const discount = parseFloat(document.getElementById('discount').value) || 0;
            const due = total - paid - discount;
            document.getElementById('dueAmount').value = due.toFixed(2);
        }
        
        function fillDue() {
            document.getElementById('paidAmount').value = lastDue;
            calculateDue();
        }
        
        // Generate Pay ID
        async function generatePayId() {
            const { data } = await client
                .from('trolley_payments')
                .select('pay_id')
                .order('id', { ascending: false })
                .limit(1);
            
            if (data && data.length > 0) {
                const lastNum = parseInt(data[0].pay_id.replace('TRPAY', ''));
                return `TRPAY${String(lastNum + 1).padStart(5, '0')}`;
            }
            return 'TRPAY00001';
        }
        
        // Save payment
        async function savePayment() {
            const paid = parseFloat(document.getElementById('paidAmount').value);
            const discount = parseFloat(document.getElementById('discount').value);
            const mode = document.getElementById('paymentMode').value;
            
            if (!paid || paid <= 0) {
                alert('Please enter paid amount');
                return;
            }
            
            const rate = parseFloat(document.getElementById('ratePerTrolley').value) || 0;
            const total = (pendingTrolleys * rate) + lastDue;
            
            if (paid > total) {
                alert('Paid amount cannot exceed total amount');
                return;
            }
            
            const due = total - paid - discount;
            const status = due === 0 ? 'paid' : (due < total ? 'partial' : 'pending');
            const payId = await generatePayId();
            
            const saveBtn = document.querySelector('.save-btn');
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
            
            try {
                const { error } = await client
                    .from('trolley_payments')
                    .insert([{
                        pay_id: payId,
                        farmer_id: farmerId,
                        name: farmerData?.name || 'Unknown',
                        total_records: pendingRecords.length,
                        total_trolleys: pendingTrolleys,
                        total_balance: total,
                        paid: paid,
                        discount: discount,
                        due: due,
                        mode: mode,
                        status: status,
                        created_at: new Date().toISOString()
                    }]);
                
                if (error) throw error;
                
                // If full payment, mark records as paid
                if (due === 0) {
                    for (let record of pendingRecords) {
                        await client
                            .from('trolley_entry')
                            .update({ payment_status: 'paid' })
                            .eq('id', record.id);
                    }
                }
                
                alert('Payment saved successfully!');
                document.getElementById('paidAmount').value = '';
                document.getElementById('discount').value = '0';
                document.getElementById('dueAmount').value = '';
                
                await loadData();
                await loadPaymentHistory();
                
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerHTML = '<i class="fas fa-save"></i> Save Payment';
            }
        }
        
        // Load payment history
        async function loadPaymentHistory() {
            const { data } = await client
                .from('trolley_payments')
                .select('*')
                .eq('farmer_id', farmerId)
                .order('created_at', { ascending: false });
            
            const tbody = document.getElementById('paymentHistory');
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" style="text-align:center">No payment records</td></tr>';
                return;
            }
            
            tbody.innerHTML = data.map((p, idx) => {
                const date = new Date(p.created_at);
                const formattedDate = `${String(date.getDate()).padStart(2, '0')}/${String(date.getMonth() + 1).padStart(2, '0')}/${date.getFullYear()}`;
                const statusClass = p.status === 'paid' ? 'status-paid' : (p.status === 'partial' ? 'status-partial' : 'status-pending');
                
                return `
                    <tr>
                        <td>${idx + 1}</td>
                        <td><strong>${p.pay_id}</strong></td>
                        <td>${p.total_trolleys} trolleys</td>
                        <td>₹${p.total_balance}</td>
                        <td>₹${p.paid}</td>
                        <td>₹${p.discount}</td>
                        <td>₹${p.due}</td>
                        <td>${p.mode?.toUpperCase() || 'CASH'}</td>
                        <td><span class="status-badge ${statusClass}">${p.status}</span></td>
                        <td>${formattedDate}</td>
                    </tr>
                `;
            }).join('');
        }
        
        // Load farmer data
        async function loadFarmer() {
            const { data } = await client
                .from('trolley_farmers')
                .select('*')
                .eq('id', farmerId)
                .single();
            
            if (data) {
                farmerData = data;
                document.getElementById('farmerInfo').innerHTML = `
                    <h2><i class="fas fa-user"></i> ${data.name}</h2>
                    <p><i class="fas fa-id-card"></i> ${data.farmerid} | <i class="fas fa-map-marker-alt"></i> ${data.address || 'No address'}</p>
                `;
            }
        }
        
        async function loadData() {
            if (!farmerId || isNaN(farmerId)) {
                document.getElementById('farmerInfo').innerHTML = '<h2>Invalid farmer ID</h2>';
                return;
            }
            
            await loadFarmer();
            pendingRecords = await getPendingRecords();
            pendingTrolleys = pendingRecords.reduce((sum, r) => sum + (r.trolley_count || 0), 0);
            
            document.getElementById('pendingRecords').value = pendingRecords.length;
            document.getElementById('totalTrolleys').value = pendingTrolleys;
            
            await getLastDue();
            calculateTotal();
        }
        
        function logout() {
            sessionStorage.removeItem('currentUser');
            window.location.href = '../index.html';
        }
        
        loadData();
        loadPaymentHistory();
    </script>
</body>
</html>
