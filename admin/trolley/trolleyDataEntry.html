<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Trolley Data Entry - Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --success: #4cc9f0;
            --danger: #f72585;
            --warning: #f8961e;
            --dark: #1a1a2e;
            --light: #f8f9fa;
            --income: #06d6a0;
            --expense: #ef476f;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: var(--light);
            min-height: 100vh;
            padding: 12px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: slideUp 0.3s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .header {
            background: linear-gradient(135deg, rgba(67, 97, 238, 0.2), rgba(63, 55, 201, 0.2));
            padding: 15px;
            color: white;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            gap: 10px;
        }
        
        .back-btn, .logout-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            padding: 8px 15px;
            border-radius: 25px;
            color: white;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        
        .back-btn:hover, .logout-btn:hover {
            background: rgba(67, 97, 238, 0.5);
            transform: scale(0.98);
        }
        
        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 12px;
            border-radius: 15px;
        }
        
        .user-welcome {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .user-welcome i {
            font-size: 24px;
            background: rgba(255, 255, 255, 0.1);
            padding: 6px;
            border-radius: 50%;
        }
        
        .user-text h4 {
            font-size: 12px;
            font-weight: 500;
            opacity: 0.9;
        }
        
        .user-text h3 {
            font-size: 14px;
            font-weight: 600;
        }
        
        .datetime-center {
            text-align: center;
        }
        
        .date {
            font-size: 10px;
            opacity: 0.9;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .time {
            font-size: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .main-content {
            padding: 20px 15px;
        }
        
        /* Stats Cards - 3 Cards like Fleet */
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-3px);
        }
        
        .stat-card i {
            font-size: 28px;
            color: var(--primary);
            margin-bottom: 8px;
        }
        
        .stat-card .stat-value {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        
        .stat-card .stat-label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.8);
        }
        
        /* Search and Filter */
        .search-filter {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .search-box {
            flex: 1;
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 10px 15px;
        }
        
        .search-box i {
            color: var(--primary);
            margin-right: 10px;
        }
        
        .search-box input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 14px;
            color: white;
            outline: none;
        }
        
        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        .filter-select {
            padding: 10px 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 14px;
            cursor: pointer;
        }
        
        /* Table */
        .table-container {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: transparent;
            font-size: 13px;
        }
        
        th {
            background: rgba(0, 0, 0, 0.4);
            padding: 12px 10px;
            text-align: left;
            font-weight: 600;
            color: var(--success);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
        }
        
        td {
            padding: 12px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.9);
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .status-pending {
            background: rgba(248, 150, 30, 0.2);
            color: var(--warning);
        }
        
        .status-approved {
            background: rgba(76, 201, 240, 0.2);
            color: var(--success);
        }
        
        .action-buttons {
            display: flex;
            gap: 5px;
        }
        
        .edit-btn, .delete-btn, .approve-btn {
            padding: 5px 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s ease;
        }
        
        .edit-btn {
            background: var(--primary);
            color: white;
        }
        
        .delete-btn {
            background: var(--danger);
            color: white;
        }
        
        .approve-btn {
            background: var(--success);
            color: white;
        }
        
        .edit-btn:hover, .delete-btn:hover, .approve-btn:hover {
            transform: scale(1.05);
        }
        
        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            padding: 15px;
        }
        
        .page-btn {
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .page-btn:hover {
            background: var(--primary);
        }
        
        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .page-info {
            color: rgba(255, 255, 255, 0.8);
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .modal-header {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-header h3 {
            font-size: 16px;
            color: var(--success);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .close-modal {
            cursor: pointer;
            font-size: 20px;
            color: #999;
            background: none;
            border: none;
        }
        
        .modal-body {
            padding: 15px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
            font-size: 13px;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 13px;
        }
        
        .save-btn {
            width: 100%;
            padding: 10px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
        }
        
        .loading i {
            font-size: 24px;
            color: var(--primary);
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .footer {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px 15px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .footer p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }
        
        @media (max-width: 768px) {
            .stats-cards {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }
            
            .stat-card {
                padding: 10px;
            }
            
            .stat-card i {
                font-size: 20px;
            }
            
            .stat-card .stat-value {
                font-size: 18px;
            }
            
            .info-bar {
                flex-direction: column;
                gap: 8px;
                text-align: center;
            }
            
            th, td {
                font-size: 11px;
                padding: 8px 6px;
            }
            
            .search-filter {
                flex-direction: column;
            }
        }
        
        @media (max-width: 500px) {
            .stats-cards {
                grid-template-columns: repeat(3, 1fr);
            }
            
            .stat-card .stat-value {
                font-size: 16px;
            }
            
            .stat-card .stat-label {
                font-size: 9px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="top-bar">
                <a href="trolleyDashboard.html" class="back-btn">
                    <i class="fas fa-arrow-left"></i>
                    <span>Back</span>
                </a>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </button>
            </div>
            
            <div class="info-bar">
                <div class="user-welcome">
                    <i class="fas fa-shopping-cart"></i>
                    <div class="user-text">
                        <h4>Trolley Data Entry</h4>
                        <h3 id="userName">Loading...</h3>
                    </div>
                </div>
                
                <div class="datetime-center">
                    <div class="date">
                        <i class="fas fa-calendar-alt"></i>
                        <span id="currentDate">Loading...</span>
                    </div>
                    <div class="time">
                        <i class="fas fa-clock"></i>
                        <span id="currentTime">Loading...</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="main-content">
            <!-- Stats Cards - 3 Cards like Fleet -->
            <div class="stats-cards">
                <div class="stat-card">
                    <i class="fas fa-chart-line"></i>
                    <div class="stat-value" id="totalCount">0</div>
                    <div class="stat-label">Total Records</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-clock"></i>
                    <div class="stat-value" id="pendingCount">0</div>
                    <div class="stat-label">Pending</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-check-circle"></i>
                    <div class="stat-value" id="approvedCount">0</div>
                    <div class="stat-label">Approved</div>
                </div>
            </div>
            
            <!-- Search and Filter -->
            <div class="search-filter">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search by farmer name or trolley ID..." onkeyup="loadData()">
                </div>
                <select id="statusFilter" class="filter-select" onchange="loadData()">
                    <option value="all">All Status</option>
                    <option value="pending">Pending</option>
                    <option value="approved">Approved</option>
                </select>
            </div>
            
            <!-- Table -->
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Date</th>
                            <th>Farmer Name</th>
                            <th>Trolley Count</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </thead>
                    <tbody id="recordsTableBody">
                        <tr>
                            <td colspan="6" class="loading">
                                <i class="fas fa-spinner"></i> Loading...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <!-- Pagination -->
            <div class="pagination" id="pagination">
                <button class="page-btn" id="prevBtn" onclick="prevPage()">Previous</button>
                <span class="page-info" id="pageInfo">Page 1</span>
                <button class="page-btn" id="nextBtn" onclick="nextPage()">Next</button>
            </div>
        </div>
        
        <div class="footer">
            <p>
                <i class="fas fa-shield-alt"></i>
                Trolley Data Entry System | Admin Access
            </p>
        </div>
    </div>
    
    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-edit"></i> Edit Trolley Record</h3>
                <button class="close-modal" onclick="closeEditModal()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>Farmer Name</label>
                    <input type="text" id="editFarmerName" readonly style="background: rgba(0,0,0,0.3);">
                </div>
                <div class="form-group">
                    <label>Trolley Count</label>
                    <input type="number" id="editTrolleyCount" required>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="editStatus">
                        <option value="pending">Pending</option>
                        <option value="approved">Approved</option>
                    </select>
                </div>
                <button class="save-btn" onclick="updateRecord()">
                    <i class="fas fa-save"></i> Update Record
                </button>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://iydamvrlxtwsnqvflaxq.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5ZGFtdnJseHR3c25xdmZsYXhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgwOTczMTIsImV4cCI6MjA3MzY3MzMxMn0.Z8m6XGyu9wsN_UJ8EZYr12BRemsO12_U8EEZ9JizQ6w';
        const client = supabase.createClient(supabaseUrl, supabaseKey);
        
        // Check auth
        const currentUser = sessionStorage.getItem('currentUser');
        if (!currentUser) {
            window.location.href = '../../index.html';
        } else {
            const user = JSON.parse(currentUser);
            document.getElementById('userName').textContent = user.username || user.id || 'Admin';
            if (user.role !== 'admin') {
                alert('Access denied. Admin privileges required.');
                window.location.href = '../../user/dashboard.html';
            }
        }
        
        // Date time
        function updateDateTime() {
            const now = new Date();
            document.getElementById('currentDate').textContent = now.toLocaleDateString('en-US', { 
                weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' 
            });
            document.getElementById('currentTime').textContent = now.toLocaleTimeString('en-US', { 
                hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true 
            });
        }
        updateDateTime();
        setInterval(updateDateTime, 1000);
        
        let allRecords = [];
        let currentPage = 1;
        const itemsPerPage = 10;
        
        // Load all trolley entries
        async function loadAllTrolleyEntries() {
            try {
                const { data, error } = await client
                    .from('trolley_entry')
                    .select(`
                        *,
                        farmers:farmer_id (name)
                    `)
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                
                allRecords = data || [];
                updateStats();
                displayCurrentPage();
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('recordsTableBody').innerHTML = '<tr><td colspan="6" style="text-align: center; color: red;">Error loading records</td></tr>';
            }
        }
        
        function updateStats() {
            const total = allRecords.length;
            const pending = allRecords.filter(r => r.status === 'pending').length;
            const approved = allRecords.filter(r => r.status === 'approved').length;
            
            document.getElementById('totalCount').textContent = total;
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('approvedCount').textContent = approved;
        }
        
        function displayCurrentPage() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const statusFilter = document.getElementById('statusFilter').value;
            
            let filteredData = allRecords;
            
            if (searchTerm) {
                filteredData = filteredData.filter(r => 
                    (r.farmers?.name || '').toLowerCase().includes(searchTerm) ||
                    (r.trolley_id || '').toLowerCase().includes(searchTerm)
                );
            }
            
            if (statusFilter !== 'all') {
                filteredData = filteredData.filter(r => r.status === statusFilter);
            }
            
            const totalPages = Math.ceil(filteredData.length / itemsPerPage);
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageData = filteredData.slice(start, end);
            
            const tbody = document.getElementById('recordsTableBody');
            
            if (pageData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">No records found</td></tr>';
                updatePagination(totalPages);
                return;
            }
            
            tbody.innerHTML = pageData.map((record, idx) => {
                const serialNo = start + idx + 1;
                const date = new Date(record.created_at);
                const formattedDate = `${String(date.getDate()).padStart(2, '0')}/${String(date.getMonth() + 1).padStart(2, '0')}/${date.getFullYear()}`;
                const statusClass = record.status === 'approved' ? 'status-approved' : 'status-pending';
                const statusText = record.status === 'approved' ? 'Approved' : 'Pending';
                
                return `
                    <tr>
                        <td><strong>${serialNo}</strong></td>
                        <td>${formattedDate}</td>
                        <td><strong>${record.farmers?.name || record.name || 'Unknown'}</strong></td>
                        <td>${record.trolley_count} trolleys</td>
                        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                        <td class="action-buttons">
                            ${record.status === 'pending' ? `<button class="approve-btn" onclick="approveRecord(${record.id})"><i class="fas fa-check"></i> Approve</button>` : ''}
                            <button class="edit-btn" onclick="openEditModal(${record.id})"><i class="fas fa-edit"></i> Edit</button>
                            <button class="delete-btn" onclick="deleteRecord(${record.id})"><i class="fas fa-trash"></i> Delete</button>
                        </td>
                    </tr>
                `;
            }).join('');
            
            updatePagination(totalPages);
        }
        
        function updatePagination(totalPages) {
            const pageInfo = document.getElementById('pageInfo');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            
            pageInfo.textContent = `Page ${currentPage} of ${totalPages || 1}`;
            prevBtn.disabled = currentPage === 1;
            nextBtn.disabled = currentPage === totalPages || totalPages === 0;
        }
        
        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                displayCurrentPage();
            }
        }
        
        function nextPage() {
            const totalPages = Math.ceil(allRecords.length / itemsPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                displayCurrentPage();
            }
        }
        
        function loadData() {
            currentPage = 1;
            displayCurrentPage();
        }
        
        // Approve record
        async function approveRecord(id) {
            if (confirm('Approve this trolley record?')) {
                const { error } = await client
                    .from('trolley_entry')
                    .update({ status: 'approved' })
                    .eq('id', id);
                
                if (error) {
                    alert('Error: ' + error.message);
                } else {
                    alert('Record approved successfully!');
                    loadAllTrolleyEntries();
                }
            }
        }
        
        // Open edit modal
        async function openEditModal(id) {
            try {
                const { data, error } = await client
                    .from('trolley_entry')
                    .select('*')
                    .eq('id', id)
                    .single();
                
                if (error) throw error;
                
                const { data: farmer } = await client
                    .from('farmers')
                    .select('name')
                    .eq('id', data.farmer_id)
                    .single();
                
                document.getElementById('editId').value = data.id;
                document.getElementById('editFarmerName').value = farmer?.name || data.name;
                document.getElementById('editTrolleyCount').value = data.trolley_count;
                document.getElementById('editStatus').value = data.status || 'pending';
                
                document.getElementById('editModal').style.display = 'flex';
            } catch (error) {
                alert('Error loading record');
            }
        }
        
        // Update record
        async function updateRecord() {
            const id = document.getElementById('editId').value;
            const trolleyCount = document.getElementById('editTrolleyCount').value;
            const status = document.getElementById('editStatus').value;
            
            const { error } = await client
                .from('trolley_entry')
                .update({
                    trolley_count: parseInt(trolleyCount),
                    status: status
                })
                .eq('id', id);
            
            if (error) {
                alert('Error: ' + error.message);
            } else {
                alert('Record updated!');
                closeEditModal();
                loadAllTrolleyEntries();
            }
        }
        
        // Delete record
        async function deleteRecord(id) {
            if (confirm('Delete this record?')) {
                const { error } = await client
                    .from('trolley_entry')
                    .delete()
                    .eq('id', id);
                
                if (error) {
                    alert('Error: ' + error.message);
                } else {
                    alert('Record deleted!');
                    loadAllTrolleyEntries();
                }
            }
        }
        
        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
        }
        
        function logout() {
            sessionStorage.removeItem('currentUser');
            window.location.href = '../../index.html';
        }
        
        window.onclick = function(event) {
            if (event.target.classList.contains('modal')) {
                event.target.style.display = 'none';
            }
        }
        
        // Initialize
        loadAllTrolleyEntries();
    </script>
</body>
</html>
