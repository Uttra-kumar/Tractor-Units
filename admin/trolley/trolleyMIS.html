<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Trolley MIS Report</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px;
            color: white;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .back-btn, .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            padding: 8px 15px;
            border-radius: 25px;
            color: white;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.15);
            padding: 10px 12px;
            border-radius: 15px;
        }

        .user-welcome {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .datetime-center {
            text-align: center;
        }

        .date, .time {
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .main-content {
            padding: 20px;
        }

        /* Filter Section */
        .filter-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 25px;
            border: 1px solid #e0e0e0;
        }

        .filter-title {
            margin-bottom: 15px;
            color: #333;
            font-size: 16px;
        }

        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
        }

        .filter-group {
            flex: 1;
            min-width: 150px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            font-weight: 500;
            color: #666;
        }

        .filter-group input, .filter-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
        }

        .filter-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 500;
        }

        /* Summary Cards */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .summary-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .summary-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .summary-card i {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .summary-card h3 {
            font-size: 28px;
            font-weight: 700;
            color: #333;
        }

        .summary-card p {
            font-size: 12px;
            color: #666;
        }

        .summary-card.income i { color: #2ecc71; }
        .summary-card.expense i { color: #e74c3c; }
        .summary-card.profit i { color: #667eea; }
        .summary-card.total i { color: #f39c12; }

        /* Additional Stats */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-box {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }

        .stat-box h4 {
            font-size: 12px;
            color: #666;
            margin-bottom: 8px;
        }

        .stat-box p {
            font-size: 20px;
            font-weight: 700;
            color: #333;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        @media (max-width: 768px) {
            .filter-row {
                flex-direction: column;
            }
            .summary-grid {
                grid-template-columns: 1fr;
            }
            .info-bar {
                flex-direction: column;
                gap: 8px;
            }
            .summary-card h3 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="top-bar">
                <a href="trolleyDashboard.html" class="back-btn">
                    <i class="fas fa-arrow-left"></i> Back
                </a>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
            
            <div class="info-bar">
                <div class="user-welcome">
                    <i class="fas fa-chart-pie"></i>
                    <div>
                        <h4>Trolley MIS Report</h4>
                        <h3 id="userName">Loading...</h3>
                    </div>
                </div>
                
                <div class="datetime-center">
                    <div class="date">
                        <i class="fas fa-calendar-alt"></i>
                        <span id="currentDate">Loading...</span>
                    </div>
                    <div class="time">
                        <i class="fas fa-clock"></i>
                        <span id="currentTime">Loading...</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="main-content">
            <!-- Filter Section -->
            <div class="filter-section">
                <div class="filter-title">
                    <i class="fas fa-sliders-h"></i> Filter Options
                </div>
                <div class="filter-row">
                    <div class="filter-group">
                        <label><i class="fas fa-calendar-alt"></i> From Date</label>
                        <input type="date" id="fromDate">
                    </div>
                    <div class="filter-group">
                        <label><i class="fas fa-calendar-alt"></i> To Date</label>
                        <input type="date" id="toDate">
                    </div>
                    <div class="filter-group">
                        <label><i class="fas fa-user"></i> Farmer</label>
                        <select id="farmerFilter">
                            <option value="all">All Farmers</option>
                        </select>
                    </div>
                    <button class="filter-btn" onclick="applyFilter()">
                        <i class="fas fa-search"></i> Apply Filter
                    </button>
                </div>
            </div>
            
            <!-- Summary Cards -->
            <div class="summary-grid">
                <div class="summary-card income">
                    <i class="fas fa-rupee-sign"></i>
                    <h3 id="totalIncome">₹0</h3>
                    <p>Total Income (Trolley Payments)</p>
                </div>
                <div class="summary-card expense">
                    <i class="fas fa-chart-line"></i>
                    <h3 id="totalExpense">₹0</h3>
                    <p>Total Expense (Diesel + Maintenance)</p>
                </div>
                <div class="summary-card profit">
                    <i class="fas fa-chart-line"></i>
                    <h3 id="netProfit">₹0</h3>
                    <p>Net Profit</p>
                </div>
                <div class="summary-card total">
                    <i class="fas fa-shopping-cart"></i>
                    <h3 id="totalRecords">0</h3>
                    <p>Total Trolley Records</p>
                </div>
            </div>
            
            <!-- Additional Stats -->
            <div class="stats-row">
                <div class="stat-box">
                    <h4><i class="fas fa-shopping-cart"></i> Total Trolleys</h4>
                    <p id="totalTrolleys">0</p>
                </div>
                <div class="stat-box">
                    <h4><i class="fas fa-gas-pump"></i> Diesel Expense</h4>
                    <p id="dieselExpense">₹0</p>
                </div>
                <div class="stat-box">
                    <h4><i class="fas fa-tools"></i> Maintenance Expense</h4>
                    <p id="maintenanceExpense">₹0</p>
                </div>
                <div class="stat-box">
                    <h4><i class="fas fa-rupee-sign"></i> Avg per Record</h4>
                    <p id="avgPerRecord">₹0</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://iydamvrlxtwsnqvflaxq.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5ZGFtdnJseHR3c25xdmZsYXhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgwOTczMTIsImV4cCI6MjA3MzY3MzMxMn0.Z8m6XGyu9wsN_UJ8EZYr12BRemsO12_U8EEZ9JizQ6w';
        const client = supabase.createClient(supabaseUrl, supabaseKey);

        const currentUser = sessionStorage.getItem('currentUser');
        if (!currentUser) {
            window.location.href = '../../index.html';
        } else {
            const user = JSON.parse(currentUser);
            document.getElementById('userName').textContent = user.username || user.id || 'Admin';
        }

        // Date time
        function updateDateTime() {
            const now = new Date();
            document.getElementById('currentDate').textContent = now.toLocaleDateString('en-US', { 
                weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' 
            });
            document.getElementById('currentTime').textContent = now.toLocaleTimeString('en-US', { 
                hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true 
            });
        }
        updateDateTime();
        setInterval(updateDateTime, 1000);

        // Load farmers for filter
        async function loadFarmers() {
            const { data } = await client
                .from('trolley_farmers')
                .select('id, name')
                .order('name');
            
            const select = document.getElementById('farmerFilter');
            if (data) {
                data.forEach(farmer => {
                    select.innerHTML += `<option value="${farmer.id}">${farmer.name}</option>`;
                });
            }
        }

        // Apply filter and load summary
        async function applyFilter() {
            const fromDate = document.getElementById('fromDate').value;
            const toDate = document.getElementById('toDate').value;
            const farmerId = document.getElementById('farmerFilter').value;
            
            await loadSummaryData(fromDate, toDate, farmerId);
        }

        // Load only aggregated data
        async function loadSummaryData(fromDate, toDate, farmerId) {
            // Build queries
            let paymentQuery = client.from('trolley_payments').select('paid, status');
            let trolleyQuery = client.from('trolley_entry').select('trolley_count');
            let dieselQuery = client.from('trolley_diesel').select('amount');
            let maintainQuery = client.from('trolley_maintain').select('amount');
            
            // Apply date filters
            if (fromDate) {
                paymentQuery = paymentQuery.gte('created_at', `${fromDate}T00:00:00`);
                trolleyQuery = trolleyQuery.gte('created_at', `${fromDate}T00:00:00`);
                dieselQuery = dieselQuery.gte('date', fromDate);
                maintainQuery = maintainQuery.gte('date', fromDate);
            }
            if (toDate) {
                paymentQuery = paymentQuery.lte('created_at', `${toDate}T23:59:59`);
                trolleyQuery = trolleyQuery.lte('created_at', `${toDate}T23:59:59`);
                dieselQuery = dieselQuery.lte('date', toDate);
                maintainQuery = maintainQuery.lte('date', toDate);
            }
            
            // Apply farmer filter
            if (farmerId !== 'all') {
                paymentQuery = paymentQuery.eq('farmer_id', parseInt(farmerId));
                trolleyQuery = trolleyQuery.eq('farmer_id', parseInt(farmerId));
            }
            
            // Execute all queries in parallel
            const [payments, trolley, diesel, maintenance] = await Promise.all([
                paymentQuery,
                trolleyQuery,
                dieselQuery,
                maintainQuery
            ]);
            
            // Calculate totals
            const totalIncome = (payments.data || [])
                .filter(p => p.status === 'paid')
                .reduce((sum, p) => sum + (p.paid || 0), 0);
            
            const dieselExpense = (diesel.data || []).reduce((sum, d) => sum + (d.amount || 0), 0);
            const maintenanceExpense = (maintenance.data || []).reduce((sum, m) => sum + (m.amount || 0), 0);
            const totalExpense = dieselExpense + maintenanceExpense;
            
            const netProfit = totalIncome - totalExpense;
            const totalRecords = (trolley.data || []).length;
            const totalTrolleys = (trolley.data || []).reduce((sum, t) => sum + (t.trolley_count || 0), 0);
            const avgPerRecord = totalRecords > 0 ? totalIncome / totalRecords : 0;
            
            // Update UI
            document.getElementById('totalIncome').textContent = '₹' + totalIncome.toLocaleString();
            document.getElementById('totalExpense').textContent = '₹' + totalExpense.toLocaleString();
            document.getElementById('netProfit').textContent = '₹' + netProfit.toLocaleString();
            document.getElementById('totalRecords').textContent = totalRecords;
            document.getElementById('totalTrolleys').textContent = totalTrolleys;
            document.getElementById('dieselExpense').textContent = '₹' + dieselExpense.toLocaleString();
            document.getElementById('maintenanceExpense').textContent = '₹' + maintenanceExpense.toLocaleString();
            document.getElementById('avgPerRecord').textContent = '₹' + avgPerRecord.toFixed(2);
        }

        function logout() {
            sessionStorage.removeItem('currentUser');
            window.location.href = '../../index.html';
        }

        // Initialize
        loadFarmers();
        applyFilter();
    </script>
</body>
</html>
